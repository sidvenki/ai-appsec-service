# ──────────────────────────────────────────────────────────────────────────
# Nginx Reverse Proxy — AI AppSec Service (Internal Deployment)
#
# Place this file at: /etc/nginx/sites-available/ai-appsec
# Then symlink:       ln -s /etc/nginx/sites-available/ai-appsec /etc/nginx/sites-enabled/
# Test config:        nginx -t
# Reload:             systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name appsec.mastek.internal;    # Change to your internal DNS name

    # Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$server_name$request_uri;

    # --- If not using HTTPS yet, serve directly ---
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running scans
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # Static files (serve directly for performance)
    location /static/ {
        alias /opt/ai-appsec-service/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Max upload size (for large repo submissions)
    client_max_body_size 50M;
}

