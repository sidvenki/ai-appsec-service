{% extends "base.html" %}
{% block title %}Home{% endblock %}

{% block content %}
<div style="text-align: center; padding: 80px 20px;">
    <div class="logo-icon" style="width: 56px; height: 56px; font-size: 24px; margin: 0 auto 24px;">
        <svg width="28" height="28" viewBox="0 0 16 16" fill="none">
            <path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5L8 1Z" stroke="white" stroke-width="1.5" fill="none"/>
            <circle cx="8" cy="8" r="2.5" fill="white"/>
        </svg>
    </div>
    <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 8px;">AI AppSec Service</h1>
    <p style="color: var(--text-secondary); font-size: 15px; max-width: 500px; margin: 0 auto 32px;">
        Internal security scanning service for traditional and AI/LLM applications.
        Submit a scan request to get started.
    </p>
    <div style="display: flex; gap: 12px; justify-content: center;">
        <a href="/new-scan" class="btn btn-primary">New Scan Request</a>
        <a href="/dashboard" class="btn btn-secondary">View Dashboard</a>
    </div>
</div>
{% endblock %}
